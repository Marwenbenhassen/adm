# ==========================================
# APPLICATION
# ==========================================
spring.application.name=mellita-backend

# ==========================================
# BASE DE DONNEES H2 PERSISTANTE
# ==========================================
spring.datasource.url=jdbc:h2:file:./data/mellitadb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 (acces via http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# IMPORTANT : desactive open-in-view pour eviter les erreurs
# de serialisation des proxies Hibernate lazy hors session
spring.jpa.open-in-view=false

# ==========================================
# JACKSON (serialisation JSON)
# ==========================================
# Evite les erreurs sur les proxies Hibernate non initialises
spring.jackson.serialization.fail-on-empty-beans=false
# Ignore les proprietes inconnues a la deserialisation
spring.jackson.deserialization.fail-on-unknown-properties=false
# Format des dates en ISO-8601 (ex: "2024-05-16T13:00:00")
spring.jackson.serialization.write-dates-as-timestamps=false

# ==========================================
# UPLOAD DE FICHIERS
# ==========================================
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
file.upload-dir=./uploads

# ==========================================
# JWT
# ==========================================
jwt.secret=mellitaSuperSecretKey2024ForJWTTokenGeneration
jwt.expiration=86400000

# Alternative (compatibilite)
app.jwt.secret=mellitaSuperSecretKey2024ForJWTTokenGeneration
app.jwt.expiration.ms=86400000

# ==========================================
# CORS
# ==========================================
cors.allowed-origins=http://localhost:4200

# ==========================================
# EMAIL (Gmail SMTP) - CONFIGURATION CORRIGÉE
# ==========================================
# Configuration SMTP Gmail de base
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=elgaiedsorhen@gmail.com
spring.mail.password=xjwwzevnxboszphb
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8

# Propriétés SMTP complètes
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Activation du debug pour voir les erreurs (désactiver en production)
spring.mail.properties.mail.debug=true

# ==========================================
# LOGGING
# ==========================================
logging.level.com.mellita=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.mail=DEBUG